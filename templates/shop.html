{% extends "base.html" %}

{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px;">
        <h1 style="color: #00ffcc; text-transform: uppercase;">City Shop</h1>
        <h2 style="color: #ffd700;">Wallet: {{ user_coins }} 🪙</h2>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">
        {% for item in items %}
        <div class="glow-box" style="width: 250px; margin: 0; padding: 20px; text-align: center; border-top: 3px solid #00ffcc; display: flex; flex-direction: column; justify-content: space-between;">
            
            <div>
                <h3 style="color: #fff; margin-bottom: 5px;">{{ item[1] }}</h3>
                <span style="background: rgba(0,255,204,0.1); color: #00ffcc; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase;">{{ item[4] }}</span>
                <p style="color: #aaa; font-size: 0.9rem; margin-top: 15px; margin-bottom: 20px; min-height: 40px;">{{ item[2] }}</p>
            </div>

            <div>
                <h2 style="color: #ffd700; margin-bottom: 15px;">{{ item[3] }} 🪙</h2>
                
                <form action="{{ url_for('main.buy_item', item_id=item[0]) }}" method="POST">
                    <button type="submit" class="btn-glow" style="padding: 10px; font-size: 1rem; width: 100%;">BUY NOW</button>
                </form>
            </div>
            
        </div>
        {% endfor %}
    </div>
{% endblock %}
