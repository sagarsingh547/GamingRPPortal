<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Maintenance</title>
    <style>
        body { background: #0f0f13; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .box { border: 2px solid #ff3366; display: inline-block; padding: 50px; border-radius: 20px; box-shadow: 0 0 20px #ff3366; position: relative; min-width: 400px; }
        h1 { color: #ff3366; font-size: 3rem; margin-bottom: 10px; }
        p { color: #aaa; font-size: 1.2rem; }
        
        /* Secret Admin Link */
        .admin-login { position: absolute; bottom: 15px; right: 20px; color: #333; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .admin-login:hover { color: #ff3366; }
    </style>
</head>
<body>
    <div class="box">
        <h1>CITY UNDER REPAIR</h1>
        <p>The server is currently under maintenance for new updates.</p>
        <p>Estimated time: <strong>Coming back soon!</strong></p>
        <div style="margin-top: 30px; font-size: 5rem;">🚧</div>
        
        <a href="/login" class="admin-login">Admin Access 🔐</a>
    </div>
</body>
</html>
