{% extends "base.html" %}
{% block content %}

<h1 style="color:#00ffcc;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:30px;text-align:left;">
    MY PROFILE
</h1>

<div style="display:flex;gap:30px;flex-wrap:wrap;text-align:left;">

    <!-- LEFT BOX -->
    <div class="glow-box" style="width:48%;min-width:320px;margin:0;">

        <div style="text-align:center;margin-bottom:20px;">

            <img
            src="{% if user[5] and user[5] != 'default.png' %}{{ url_for('static', filename='uploads/' ~ user[5]) }}{% else %}https://ui-avatars.com/api/?name={{ user[0] }}&background=0d1117&color=00ffcc{% endif %}"
            alt="Avatar"
            style="width:120px;height:120px;border-radius:50%;border:3px solid #00ffcc;object-fit:cover;margin-bottom:15px;">

            <h2 style="color:#fff;margin:10px 0 5px 0;">{{ user[0] }}</h2>

            <span style="background:#222;padding:5px 12px;border-radius:6px;color:#00ffcc;font-size:14px;">
                {{ user[2] }}
            </span>

        </div>

        <p style="color:#aaa;margin-bottom:10px;">
            <strong>Email:</strong> {{ user[1] }}
        </p>

        <p style="color:#aaa;margin-bottom:10px;">
            <strong>Level:</strong> {{ user[3] }}
        </p>

        <p style="color:#aaa;margin-bottom:10px;">
            <strong>XP:</strong> {{ user[4] }}
        </p>

        <p style="color:#aaa;margin-bottom:20px;">
            <strong>Joined:</strong>
            {% if user[6] %}
                {{ user[6] }}
            {% else %}
                N/A
            {% endif %}
        </p>

        <hr style="border:1px solid #333;margin-bottom:20px;">

        <h3 style="color:#fff;margin-bottom:15px;">Change Avatar</h3>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <input type="file" name="avatar" class="form-control" accept="image/*" required>
            </div>

            <button type="submit" class="btn-glow" style="font-size:1rem;padding:8px 15px;">
                Upload Image
            </button>
        </form>

    </div>

    <!-- RIGHT BOX -->
    <div class="glow-box" style="width:48%;min-width:320px;margin:0;height:fit-content;">

        <h2 style="color:#ffd700;margin-bottom:20px;">Change Password</h2>

        <form method="POST">

            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>

            <button type="submit" class="btn-glow"
            style="font-size:1rem;padding:8px 15px;border-color:#ffd700;color:#ffd700;">
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
