{% extends "base.html" %}
{% block content %}
    <h1 style="color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px; text-align: left;">🔔 NOTIFICATIONS</h1>
    
    <div style="text-align: left; max-width: 800px;">
        {% if notifications %}
            {% for notif in notifications %}
            <div style="background: #1a1a24; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid {% if notif[1] %}#333{% else %}#00ffcc{% endif %}; opacity: {% if notif[1] %}0.7{% else %}1{% endif %};">
                <p style="color: #fff; font-size: 1.1rem;">{{ notif[0] }}</p>
                <small style="color: #777; display: block; margin-top: 10px;">{{ notif[2].strftime('%Y-%m-%d %H:%M') }}</small>
            </div>
            {% endfor %}
        {% else %}
            <p style="color: #777; font-size: 1.2rem;">You have no new notifications.</p>
        {% endif %}
    </div>
{% endblock %}
