{% extends "base.html" %}

{% block content %}
<div class="glow-box">
    <h2 style="margin-bottom: 20px; color: #ffd700;">RESET PASSWORD</h2>
    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">Enter your Username and registered Email to set a new password.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Registered Email Address</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" class="form-control" required>
        </div>
        <button type="submit" class="btn-glow" style="border-color: #ffd700; color: #ffd700;">Reset Password</button>
    </form>
</div>
{% endblock %}
